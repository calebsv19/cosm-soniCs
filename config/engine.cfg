# Runtime configuration for the minimal DAW prototype.
sample_rate = 48000
block_size = 128

# Fade defaults (milliseconds). Set to 0 to disable automatic fades for new clips.
fade_default_in_ms = 0
fade_default_out_ms = 0

# Clip inspector preset buttons (milliseconds, comma-separated).
fade_presets_ms = 0, 10, 50, 100

# Diagnostic logging toggles.
enable_engine_logs = off
enable_cache_logs = off
enable_timing_logs = off
