name: DAW Loop Gates

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/**'
      - 'include/**'
      - 'SDLApp/**'
      - 'tools/run_loop_gates.sh'
      - 'Makefile'
      - '.github/workflows/loop-gates.yml'

jobs:
  loop-gates:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        shell: bash
        run: |
          set -euo pipefail
          brew list pkg-config >/dev/null 2>&1 || brew install pkg-config
          brew list sdl2 >/dev/null 2>&1 || brew install sdl2
          brew list sdl2_ttf >/dev/null 2>&1 || brew install sdl2_ttf
          brew list vulkan-loader >/dev/null 2>&1 || brew install vulkan-loader

      - name: Build DAW
        run: make

      - name: Run Gate Harness
        id: gates
        shell: bash
        run: |
          set +e
          RUN_SECONDS=6 HEADLESS=1 ./tools/run_loop_gates.sh
          gate_exit=$?
          echo "gate_exit=$gate_exit" >> "$GITHUB_OUTPUT"
          set -e
          if [ "$gate_exit" -eq 1 ]; then
            echo "Gate harness reported failure"
            exit 1
          fi
          if [ "$gate_exit" -eq 2 ]; then
            echo "Gate harness inconclusive in CI environment"
          fi

      - name: Upload Gate Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daw-loop-gate-logs
          path: /tmp/daw_loop_gates_*
